<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VideoLoader</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --text:#f0f0ee;
  --muted:#888;
  --accent:#e8ff4a;
  --accent-dim:#c4d93e;
  --red:#ff5a5a;
  --green:#4aff8a;
  --radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:3rem 1rem 5rem;min-height:100vh}

.logo{font-size:2.2rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.25rem}
.logo span{color:var(--accent)}
.tagline{font-size:.8rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3rem}

.card{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}

.platforms{display:flex;gap:0;border-bottom:1px solid var(--border)}
.plat{flex:1;padding:.6rem;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border)}
.plat:last-child{border-right:none}
.plat svg{width:18px;height:18px}
.plat.yt{color:#ff4545}
.plat.ig{color:#d070ff}
.plat.tt{color:var(--text)}
.plat.tw{color:#4a9eff}

.form-area{padding:1.5rem}

.url-row{display:flex;gap:8px;margin-bottom:1rem}
.url-row input{
  flex:1;padding:12px 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);
  font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;
  transition:border-color .15s
}
.url-row input:focus{border-color:#444}
.url-row input::placeholder{color:var(--muted)}

.detect-label{height:18px;font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:.75rem}
.detect-label b{color:var(--accent);font-weight:500}

.opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.opt label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.opt select{
  width:100%;padding:8px 10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Syne',sans-serif;font-size:12px;
  outline:none;cursor:pointer
}

.dl-btn{
  width:100%;padding:13px;
  background:var(--accent);color:#0d0d0d;
  border:none;border-radius:var(--radius);
  font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;
  letter-spacing:.04em;cursor:pointer;
  transition:background .15s,transform .1s
}
.dl-btn:hover{background:var(--accent-dim)}
.dl-btn:active{transform:scale(.98)}
.dl-btn:disabled{background:#333;color:#666;cursor:not-allowed}

/* Progress */
.progress-area{padding:0 1.5rem 1.5rem;display:none}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem}
.prog-title{font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.prog-pct{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--accent)}
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:.75rem}
.prog-bar{height:100%;background:var(--accent);width:0%;transition:width .3s;border-radius:2px}
.prog-status{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);min-height:1rem}

/* Done */
.done-area{padding:0 1.5rem 1.5rem;display:none}
.done-file{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid #2a3a1a;border-radius:var(--radius);padding:.75rem 1rem}
.done-name{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--green);max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-file-btn{padding:7px 14px;background:var(--green);color:#0d0d0d;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap}
.dl-file-btn:hover{opacity:.85}

/* Error */
.error-area{padding:0 1.5rem 1.5rem;display:none}
.error-box{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:var(--radius);padding:.75rem 1rem}
.error-box p{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--red);white-space:pre-wrap;line-height:1.6}

/* Log toggle */
.log-toggle{font-size:.65rem;color:var(--muted);cursor:pointer;text-decoration:underline;margin-top:.5rem;display:inline-block}
.log-box{display:none;margin-top:.5rem;background:var(--surface2);border-radius:7px;padding:.6rem .8rem;max-height:120px;overflow-y:auto}
.log-box p{font-family:'DM Mono',monospace;font-size:.65rem;color:#666;line-height:1.6}

.reset-btn{margin-top:.75rem;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer;text-decoration:underline}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulsing .prog-bar{animation:pulse 1.5s infinite}

.note{margin-top:2rem;max-width:600px;font-size:.7rem;color:var(--muted);line-height:1.7;text-align:center}
.note a{color:var(--muted);text-decoration:underline}
</style>
</head>
<body>

<div class="logo">Video<span>Loader</span></div>
<div class="tagline">YouTube · Instagram · TikTok · X/Twitter · +1000 sites</div>

<div class="card">
  <!-- Platform badges -->
  <div class="platforms">
    <div class="plat yt">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
      YouTube
    </div>
    <div class="plat ig">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Instagram
    </div>
    <div class="plat tt">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.6 3a4.4 4.4 0 0 1-4.4-4.4h-3.1v14.7a2.6 2.6 0 1 1-1.9-2.5V7.6a5.7 5.7 0 1 0 5 5.7V8.2A7.6 7.6 0 0 0 19.6 9V6a4.4 4.4 0 0 1-4.4-3z"/></svg>
      TikTok
    </div>
    <div class="plat tw">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 1.2h3.5l-7.6 8.7 8.9 11.8h-7L11.6 14 5 21.7H1.5l8.1-9.3L1 1.2h7.2l5.5 7.3 6.2-7.3zm-1.2 18.5h1.9L6.4 3.1H4.4l13.3 16.6z"/></svg>
      X / Twitter
    </div>
  </div>

  <!-- Form -->
  <div class="form-area" id="form-area">
    <div class="url-row">
      <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..." oninput="detectPlatform()" />
    </div>
    <div class="detect-label" id="detect-label"></div>

    <div class="opts">
      <div class="opt">
        <label>Conteneur</label>
        <select id="fmt">
          <option value="mp4">MP4</option>
          <option value="webm">WebM</option>
          <option value="mkv">MKV</option>
        </select>
      </div>
      <div class="opt">
        <label>Résolution</label>
        <select id="res">
          <option value="">Meilleure</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="360">360p</option>
        </select>
      </div>
      <div class="opt">
        <label>Audio seul</label>
        <select id="audio">
          <option value="">Non</option>
          <option value="mp3">MP3</option>
          <option value="m4a">M4A</option>
          <option value="opus">Opus</option>
        </select>
      </div>
    </div>

    <button class="dl-btn" id="dl-btn" onclick="startDownload()">Télécharger</button>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progress-area">
    <div class="prog-header">
      <span class="prog-title" id="prog-title">Téléchargement…</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
    <div class="prog-status" id="prog-status"></div>
    <span class="log-toggle" onclick="toggleLog()">Voir les logs</span>
    <div class="log-box" id="log-box"></div>
  </div>

  <!-- Done -->
  <div class="done-area" id="done-area">
    <div class="done-file">
      <span class="done-name" id="done-name"></span>
      <button class="dl-file-btn" id="dl-file-btn">Télécharger ↓</button>
    </div>
    <button class="reset-btn" onclick="reset()">Nouveau téléchargement</button>
  </div>

  <!-- Error -->
  <div class="error-area" id="error-area">
    <div class="error-box"><p id="error-msg"></p></div>
    <button class="reset-btn" onclick="reset()">Réessayer</button>
  </div>
</div>

<p class="note">
  Nécessite <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a> et <a href="https://ffmpeg.org" target="_blank">ffmpeg</a> installés sur le serveur.<br>
  Usage personnel uniquement. Respectez les CGU des plateformes.
</p>

<script>
const API = window.location.origin;
let currentJob = null;
let pollTimer = null;
let logVisible = false;

const platforms = [
  {re:/youtu\.?be/,name:'YouTube',cls:'yt'},
  {re:/instagram\.com/,name:'Instagram',cls:'ig'},
  {re:/tiktok\.com/,name:'TikTok',cls:'tt'},
  {re:/twitter\.com|x\.com/,name:'X / Twitter',cls:'tw'},
  {re:/twitch\.tv/,name:'Twitch',cls:''},
  {re:/dailymotion/,name:'Dailymotion',cls:''},
  {re:/vimeo\.com/,name:'Vimeo',cls:''},
  {re:/reddit\.com/,name:'Reddit',cls:''},
];

function detectPlatform(){
  const v = document.getElementById('url').value;
  const el = document.getElementById('detect-label');
  for(const p of platforms){
    if(p.re.test(v)){
      el.innerHTML = `Plateforme détectée : <b>${p.name}</b>`;
      return;
    }
  }
  el.textContent = v.length > 6 ? 'Site inconnu — yt-dlp supporte 1000+ sources' : '';
}

async function startDownload(){
  const url = document.getElementById('url').value.trim();
  if(!url){alert('Colle une URL d\'abord !');return;}

  const fmt = document.getElementById('fmt').value;
  const res = document.getElementById('res').value;
  const audioVal = document.getElementById('audio').value;

  document.getElementById('dl-btn').disabled = true;

  const body = {
    url,
    format: fmt,
    resolution: res,
    audio_only: !!audioVal,
    audio_format: audioVal || 'mp3'
  };

  try{
    const r = await fetch(`${API}/api/download`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data = await r.json();
    if(data.job_id){
      currentJob = data.job_id;
      showProgress();
      poll();
    } else {
      showError('Erreur lors du démarrage du job.');
    }
  } catch(e){
    showError('Impossible de joindre le serveur.\nVérifiez que server.py tourne sur le port 8000.\n\n'+e.message);
  }
}

function showProgress(){
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('progress-area').style.display = 'block';
}

function poll(){
  pollTimer = setInterval(async ()=>{
    if(!currentJob) return;
    try{
      const r = await fetch(`${API}/api/status/${currentJob}`);
      const d = await r.json();

      // Update progress bar
      const pct = Math.round(d.progress || 0);
      document.getElementById('prog-bar').style.width = pct+'%';
      document.getElementById('prog-pct').textContent = pct+'%';

      // Status text
      const statusMap = {
        queued:'En attente…',
        downloading:'Téléchargement…',
        processing:'Post-traitement (ffmpeg)…',
        done:'Terminé !',
        error:'Erreur'
      };
      document.getElementById('prog-title').textContent = statusMap[d.status] || d.status;

      // Logs
      if(d.log && d.log.length){
        const last = d.log[d.log.length-1];
        document.getElementById('prog-status').textContent = last.slice(0,80);
        document.getElementById('log-box').innerHTML = d.log.map(l=>`<p>${escHtml(l)}</p>`).join('');
        document.getElementById('log-box').scrollTop = 9999;
      }

      if(d.status === 'done'){
        clearInterval(pollTimer);
        showDone(d.file);
      } else if(d.status === 'error'){
        clearInterval(pollTimer);
        showError(d.error || 'Erreur inconnue');
      }
    } catch(e){
      document.getElementById('prog-status').textContent = 'Perte de connexion avec le serveur…';
    }
  }, 800);
}

function showDone(filename){
  document.getElementById('progress-area').style.display = 'none';
  document.getElementById('done-area').style.display = 'block';
  document.getElementById('done-name').textContent = filename || 'fichier.mp4';
  document.getElementById('dl-file-btn').onclick = ()=>{
    window.location.href = `${API}/api/file/${currentJob}`;
  };
}

function showError(msg){
  document.getElementById('progress-area').style.display = 'none';
  document.getElementById('error-area').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

function reset(){
  clearInterval(pollTimer);
  if(currentJob){
    fetch(`${API}/api/job/${currentJob}`,{method:'DELETE'}).catch(()=>{});
  }
  currentJob = null;
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('progress-area').style.display = 'none';
  document.getElementById('done-area').style.display = 'none';
  document.getElementById('error-area').style.display = 'none';
  document.getElementById('dl-btn').disabled = false;
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-pct').textContent = '0%';
  document.getElementById('prog-status').textContent = '';
  document.getElementById('log-box').innerHTML = '';
}

function toggleLog(){
  logVisible = !logVisible;
  document.getElementById('log-box').style.display = logVisible ? 'block':'none';
  document.querySelector('.log-toggle').textContent = logVisible ? 'Masquer les logs':'Voir les logs';
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


</script>
</body>
</html>
